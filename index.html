<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chloé · Morning Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #F5EFE6; color: #1A1614; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  button { cursor: pointer; transition: all 0.15s ease; font-family: inherit; }
  button:active { transform: scale(0.97); }
  button:disabled { cursor: not-allowed; }
  input { font-family: inherit; }
  input:focus { outline: none; }
  ul { list-style: none; }

  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.85; } }
  @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }

  /* === HOME === */
  .home { min-height: 100vh; background: linear-gradient(180deg, #F5EFE6 0%, #E8DFD0 100%); display: flex; align-items: center; justify-content: center; padding: 24px; }
  .home-inner { width: 100%; max-width: 420px; text-align: center; animation: fadeIn 0.6s ease; }
  .brand { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 40px; }
  .brand-line { flex: 1; height: 1px; background: #1A1614; max-width: 60px; }
  .brand-text { font-family: 'Cormorant Garamond', serif; font-size: 28px; letter-spacing: 4px; font-weight: 400; }
  .title { font-family: 'Cormorant Garamond', serif; font-size: 48px; line-height: 1.05; font-weight: 300; letter-spacing: -1px; margin-bottom: 16px; }
  .title-accent { font-style: italic; font-weight: 500; color: #C9A876; }
  .subtitle { font-size: 11px; letter-spacing: 3px; color: #3A3530; margin-bottom: 32px; text-transform: uppercase; font-weight: 500; }
  .btn-group { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px; }
  .btn-primary { background: #1A1614; color: #FBF7F0; border: none; padding: 20px 24px; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%; }
  .btn-secondary { background: transparent; color: #1A1614; border: 1.5px solid #1A1614; padding: 20px 24px; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%; }
  .btn-label { font-size: 10px; letter-spacing: 2.5px; opacity: 0.7; font-weight: 500; }
  .btn-main { font-family: 'Cormorant Garamond', serif; font-size: 22px; letter-spacing: 2px; font-weight: 500; }
  .footer { font-size: 10px; letter-spacing: 2px; color: #3A3530; font-style: italic; font-family: 'Cormorant Garamond', serif; }

  /* === SCREENS === */
  .screen { min-height: 100vh; padding: 32px 24px; display: flex; align-items: flex-start; justify-content: center; }
  .screen-inner { width: 100%; max-width: 480px; animation: fadeIn 0.4s ease; }
  .screen-title { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 400; letter-spacing: 1px; margin-bottom: 16px; }
  .screen-text { font-size: 15px; line-height: 1.6; color: #3A3530; margin-bottom: 32px; }
  .form-group { margin-bottom: 20px; }
  .label { display: block; font-size: 10px; letter-spacing: 2.5px; font-weight: 700; color: #8B4513; margin-bottom: 8px; }
  .input { width: 100%; padding: 16px 18px; font-size: 16px; background: #FBF7F0; border: 1.5px solid #E8DFD0; color: #1A1614; }
  .input-code { font-family: 'Cormorant Garamond', serif; font-size: 24px; letter-spacing: 6px; text-align: center; font-weight: 500; text-transform: uppercase; }
  .error { background: #FFE4E1; color: #8B0000; padding: 12px; font-size: 13px; margin-bottom: 16px; border: 1px solid #FFB6B6; }

  /* === MASTER GAME === */
  .master-screen { min-height: 100vh; padding: 20px 18px 40px; max-width: 520px; margin: 0 auto; }
  .master-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: #1A1614; color: #FBF7F0; margin-bottom: 16px; }
  .code-label { font-size: 9px; letter-spacing: 2px; opacity: 0.7; }
  .code-value { font-family: 'Cormorant Garamond', serif; font-size: 24px; letter-spacing: 4px; font-weight: 500; }
  .share-btn { background: #C9A876; color: #1A1614; border: none; padding: 10px 16px; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; }
  .players-bar { font-size: 12px; color: #3A3530; padding: 8px 4px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .players-dot { color: #3DA85B; font-size: 14px; animation: pulseDot 2s infinite; }
  .players-list { opacity: 0.7; font-size: 11px; }

  /* Round banner */
  .round-banner { background: linear-gradient(135deg, #C9A876 0%, #A8895B 100%); color: #1A1614; padding: 14px 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .round-banner-left { display: flex; flex-direction: column; gap: 2px; }
  .round-banner-label { font-size: 9px; letter-spacing: 2px; font-weight: 700; opacity: 0.8; }
  .round-banner-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; letter-spacing: 1px; line-height: 1; }
  .round-banner-prog { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 500; font-style: italic; }

  .progress-bar { height: 3px; background: #E8DFD0; overflow: hidden; margin-bottom: 16px; }
  .progress-fill { height: 100%; background: #1A1614; transition: width 0.4s ease; }

  .question-card { background: #FBF7F0; padding: 24px; margin-bottom: 16px; border: 1px solid #E8DFD0; animation: fadeIn 0.4s ease; }
  .question-tag { font-size: 9px; letter-spacing: 3px; font-weight: 700; color: #8B4513; margin-bottom: 14px; }
  .question-text { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 500; line-height: 1.3; margin-bottom: 16px; }
  .emotion-big { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 400; letter-spacing: 2px; line-height: 1.1; margin-bottom: 12px; }
  
  .master-instructions {
    background: #1A1614;
    color: #FBF7F0;
    padding: 22px 24px;
    margin-bottom: 18px;
    border-left: 6px solid #C9A876;
  }

  .master-instructions-label {
    font-size: 11px;
    letter-spacing: 3px;
    opacity: 0.65;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .master-instructions-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    line-height: 1.35;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .question-desc { font-size: 14px; line-height: 1.6; color: #3A3530; font-style: italic; font-family: 'Cormorant Garamond', serif; margin-bottom: 16px; }
  .indices-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .indice-chip { background: #F5EFE6; padding: 6px 12px; font-size: 12px; color: #3A3530; border: 1px solid #E8DFD0; }
  .cliente-bubble { display: flex; gap: 12px; align-items: flex-start; background: #F5EFE6; padding: 16px; border: 1px dashed #A8895B; }
  .cliente-icon { font-size: 26px; }
  .cliente-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 17px; line-height: 1.5; color: #1A1614; }
  .reponse-box { margin-top: 16px; padding: 16px; background: #1A1614; color: #FBF7F0; animation: fadeIn 0.4s ease; }
  .reponse-label { font-size: 9px; letter-spacing: 2.5px; opacity: 0.6; margin-bottom: 8px; }
  .reponse-value { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 500; letter-spacing: 1px; }
  .reponse-text { font-size: 13px; line-height: 1.6; margin-bottom: 12px; }
  .mots-cles { display: flex; flex-wrap: wrap; gap: 6px; }
  .mot-cle { background: #C9A876; color: #1A1614; padding: 4px 10px; font-size: 11px; font-weight: 600; }

  .buzz-alert { background: #C9A876; padding: 18px; margin-bottom: 16px; position: relative; overflow: hidden; animation: fadeIn 0.3s ease; }
  .buzz-pulse { position: absolute; top: 50%; left: 22px; width: 16px; height: 16px; border-radius: 50%; background: #1A1614; transform: translateY(-50%); animation: pulse 1s infinite; }
  .buzz-content { padding-left: 32px; margin-bottom: 14px; }
  .buzz-label { font-size: 10px; letter-spacing: 2.5px; font-weight: 700; margin-bottom: 2px; }
  .buzz-name { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 500; color: #1A1614; }
  .buzz-actions { display: flex; gap: 8px; }
  .buzz-correct { flex: 1; background: #1A1614; color: #FBF7F0; border: none; padding: 14px 12px; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; }
  .buzz-wrong { background: #FBF7F0; color: #1A1614; border: 1.5px solid #1A1614; padding: 14px 16px; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; }

  /* Tirage au sort - manche 4 */
  .draw-area { background: linear-gradient(135deg, #1A1614 0%, #3A3530 100%); color: #FBF7F0; padding: 28px; margin-bottom: 16px; text-align: center; }
  .draw-label { font-size: 10px; letter-spacing: 2.5px; opacity: 0.6; margin-bottom: 12px; }
  .draw-bag { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 500; letter-spacing: 1px; margin-bottom: 16px; }
  .draw-emotion-tag { display: inline-block; background: #C9A876; color: #1A1614; padding: 4px 12px; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; margin-bottom: 16px; }
  .draw-arrow { font-size: 24px; opacity: 0.5; margin: 8px 0; }
  .draw-player { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 600; color: #C9A876; letter-spacing: 2px; min-height: 48px; }
  .draw-player.shimmer { background: linear-gradient(90deg, #C9A876 0%, #FBF7F0 50%, #C9A876 100%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 1.5s linear infinite; }
  .draw-btn { width: 100%; background: #C9A876; color: #1A1614; border: none; padding: 16px; font-size: 12px; font-weight: 700; letter-spacing: 2px; margin-top: 12px; }
  .draw-btn:disabled { opacity: 0.4; }

  /* Free response - manche 3 et 4 */
  .free-response-box { background: #FBF7F0; border: 1px solid #E8DFD0; padding: 18px; margin-bottom: 16px; }
  .free-response-title { font-size: 10px; letter-spacing: 2.5px; font-weight: 700; color: #8B4513; margin-bottom: 12px; }
  .free-response-hint { font-size: 13px; color: #3A3530; line-height: 1.6; font-style: italic; font-family: 'Cormorant Garamond', serif; margin-bottom: 12px; }
  .award-buttons { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 6px; }
  .award-btn { background: #F5EFE6; border: 1px solid #E8DFD0; padding: 10px 8px; font-size: 12px; font-weight: 600; color: #1A1614; text-align: center; }
  .award-btn:hover { background: #C9A876; }

  .controls { margin-bottom: 16px; }
  .reveal-btn { width: 100%; background: #FBF7F0; color: #1A1614; border: 1.5px solid #1A1614; padding: 14px; font-size: 12px; font-weight: 700; letter-spacing: 2px; margin-bottom: 10px; }
  .nav-row { display: flex; gap: 8px; }
  .nav-btn { flex: 1; background: transparent; color: #1A1614; border: 1.5px solid #E8DFD0; padding: 14px; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; }
  .nav-btn:disabled { opacity: 0.3; }
  .nav-btn-primary { flex: 1.5; background: #1A1614; color: #FBF7F0; border: none; padding: 14px; font-size: 12px; font-weight: 700; letter-spacing: 2px; }

  .scores-panel { background: #FBF7F0; border: 1px solid #E8DFD0; padding: 16px; margin-top: 12px; }
  .scores-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 10px; letter-spacing: 2.5px; font-weight: 700; color: #8B4513; }
  .reset-btn { background: transparent; border: 1px solid #E8DFD0; font-size: 9px; padding: 4px 8px; letter-spacing: 1.5px; color: #3A3530; }
  .score-row-live { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #E8DFD0; gap: 12px; }
  .score-row-live:last-child { border-bottom: none; }
  .score-rank { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: #C9A876; font-weight: 500; width: 24px; }
  .score-name { flex: 1; font-size: 14px; font-weight: 500; }
  .score-value-live { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: #1A1614; min-width: 30px; text-align: right; }
  .point-controls { display: flex; gap: 4px; }
  .point-btn { background: #F5EFE6; border: 1px solid #E8DFD0; width: 28px; height: 28px; font-size: 14px; font-weight: 700; color: #1A1614; }

  /* === PLAYER === */
  .player-screen { min-height: 100vh; padding: 20px 18px; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; }
  .player-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: #1A1614; color: #FBF7F0; margin-bottom: 12px; }
  .player-name-label { font-size: 9px; letter-spacing: 2px; opacity: 0.7; margin-bottom: 2px; }
  .player-name-value { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; }
  .player-score-box { text-align: right; }
  .player-score-label { font-size: 9px; letter-spacing: 2px; opacity: 0.7; margin-bottom: 2px; }
  .player-score-value { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: #C9A876; }

  .player-round-banner { background: linear-gradient(135deg, #C9A876 0%, #A8895B 100%); color: #1A1614; padding: 12px 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .player-round-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; letter-spacing: 1px; }
  .player-round-prog { font-size: 12px; font-weight: 600; }

  .player-question-card { background: #FBF7F0; padding: 22px; border: 1px solid #E8DFD0; margin-bottom: 20px; }
  .player-listen { text-align: center; padding: 24px 16px 16px; }
  .listen-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.7; }
  .listen-text { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; letter-spacing: 1px; color: #1A1614; }
  .player-hint { font-size: 12px; color: #3A3530; font-style: italic; font-family: 'Cormorant Garamond', serif; margin-top: 12px; text-align: center; }

  .buzzer-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px 0; min-height: 280px; }
  .buzzer-btn { width: 240px; height: 240px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #C9A876, #A8895B); border: none; color: #1A1614; box-shadow: 0 12px 30px rgba(168,137,91,0.4), inset 0 -8px 20px rgba(0,0,0,0.15), inset 0 4px 12px rgba(255,255,255,0.3); position: relative; }
  .buzzer-btn:disabled { opacity: 0.5; }
  .buzzer-inner { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
  .buzzer-label { font-family: 'Cormorant Garamond', serif; font-size: 56px; font-weight: 600; letter-spacing: 6px; margin-bottom: 8px; }
  .buzzer-sub-label { font-size: 10px; letter-spacing: 2.5px; font-weight: 600; opacity: 0.8; }

  .my-buzz-message { text-align: center; padding: 40px 20px; background: #C9A876; width: 100%; animation: fadeIn 0.3s ease; }
  .my-buzz-icon { font-size: 60px; margin-bottom: 12px; animation: pulse 0.8s infinite; }
  .my-buzz-text { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 600; letter-spacing: 2px; margin-bottom: 8px; }
  .my-buzz-sub { font-size: 12px; letter-spacing: 1.5px; opacity: 0.8; }

  .other-buzz-message { text-align: center; padding: 40px 20px; background: #E8DFD0; width: 100%; }
  .other-buzz-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .other-buzz-text { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; color: #3A3530; }

  .revealed-message { text-align: center; padding: 40px 20px; background: #FBF7F0; border: 1px solid #E8DFD0; width: 100%; }
  .revealed-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .revealed-sub { font-size: 11px; color: #3A3530; font-style: italic; margin-top: 8px; }

  /* Player draw - manche 4 */
  .player-chosen { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #C9A876 0%, #A8895B 100%); color: #1A1614; width: 100%; animation: fadeIn 0.3s ease; }
  .player-chosen-icon { font-size: 60px; margin-bottom: 12px; }
  .player-chosen-text { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; letter-spacing: 2px; margin-bottom: 12px; }
  .player-chosen-bag { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; font-style: italic; padding: 12px; background: rgba(26,22,20,0.1); margin-bottom: 8px; }
  .player-chosen-sub { font-size: 13px; line-height: 1.5; }
  .player-waiting-draw { text-align: center; padding: 40px 20px; background: #FBF7F0; border: 1px solid #E8DFD0; width: 100%; }
  .player-waiting-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .player-waiting-text { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; color: #3A3530; margin-bottom: 6px; }
  .player-waiting-sub { font-size: 12px; color: #3A3530; font-style: italic; }

  /* === END === */
  .podium { display: flex; justify-content: center; align-items: flex-end; gap: 12px; margin: 32px 0; }
  .podium-player { flex: 1; background: #FBF7F0; padding: 16px; text-align: center; border: 1px solid #E8DFD0; }
  .podium-first { background: #C9A876; transform: scale(1.1); }
  .podium-rank { font-size: 36px; margin-bottom: 8px; }
  .podium-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .podium-score { font-size: 12px; color: #3A3530; }
  .all-scores { margin-bottom: 24px; }
  .score-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #E8DFD0; font-size: 14px; }
  .score-row-me { font-weight: 700; color: #8B4513; }
  .score-value { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; }
  .my-result { background: #C9A876; padding: 32px; text-align: center; margin-bottom: 24px; }
  .my-result-label { font-size: 10px; letter-spacing: 2.5px; font-weight: 700; margin-bottom: 8px; }
  .my-result-rank { font-family: 'Cormorant Garamond', serif; font-size: 64px; font-weight: 600; line-height: 1; margin-bottom: 8px; }
  .my-result-score { font-size: 16px; font-weight: 600; letter-spacing: 1px; }

  .loading { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic; color: #3A3530; }
  .spinner { width: 32px; height: 32px; border: 2px solid #E8DFD0; border-top-color: #1A1614; border-radius: 50%; animation: spin 0.8s linear infinite; }

  /* === FEEDBACK === */
  .feedback-box { background: #FBF7F0; border: 1px solid #E8DFD0; padding: 20px; margin-bottom: 24px; }
  .feedback-title { font-size: 10px; letter-spacing: 2.5px; font-weight: 700; color: #8B4513; margin-bottom: 16px; }
  .feedback-section-label { font-size: 10px; letter-spacing: 2px; font-weight: 700; margin: 12px 0 8px; color: #3A3530; }
  .feedback-section-label.green { color: #2E7D32; }
  .feedback-section-label.orange { color: #C45A00; }
  .feedback-item { padding: 12px; margin-bottom: 8px; border: 1px solid #E8DFD0; }
  .feedback-item.strong { background: #F0F7F0; border-color: #A8D5AA; }
  .feedback-item.improve { background: #FFF8F0; border-color: #E8C88A; }
  .feedback-item-top { display: flex; align-items: center; gap: 10px; }
  .feedback-icon { font-size: 20px; flex-shrink: 0; }
  .feedback-skill { flex: 1; font-size: 14px; font-weight: 600; color: #1A1614; }
  .feedback-pts { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: #C9A876; }
  .feedback-tip { font-size: 12px; line-height: 1.6; color: #3A3530; font-style: italic; font-family: 'Cormorant Garamond', serif; margin-top: 10px; padding-top: 10px; border-top: 1px solid #E8DFD0; }
  .feedback-perfect { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-style: italic; color: #2E7D32; text-align: center; padding: 16px; }

  /* === MASTER FEEDBACK === */
  .master-feedback { background: #FBF7F0; border: 1px solid #E8DFD0; padding: 16px; margin-bottom: 20px; }
  .master-feedback-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #E8DFD0; }
  .master-feedback-row:last-of-type { border-bottom: none; }
  .master-feedback-name { font-size: 13px; font-weight: 600; flex: 1; min-width: 80px; }
  .master-feedback-rounds { display: flex; gap: 8px; }

// Identifiant boutique stocké localement
let boutiqueId = localStorage.getItem('chloe_boutique_id') || null;
let boutiqueName = localStorage.getItem('chloe_boutique_name') || null;

// Les rounds actifs (par défaut = DEFAULT_ROUNDS, remplacés si la boutique a des questions perso)
let ROUNDS = JSON.parse(JSON.stringify(DEFAULT_ROUNDS));

// Charger les questions perso de la boutique depuis Firebase
async function loadBoutiqueRounds() {
  if (!boutiqueId || !FIREBASE_CONFIGURED) return;
  try {
    const snap = await db.ref(`boutiques/${boutiqueId}/rounds`).once('value');
    if (snap.exists()) {
      const saved = snap.val();
      // Fusionner avec les rounds par défaut (structure) en remplaçant les questions
      ROUNDS = DEFAULT_ROUNDS.map((defaultRound, i) => {
        const savedRound = saved[i];
        if (savedRound && savedRound.questions && savedRound.questions.length > 0) {
          return { ...defaultRound, questions: savedRound.questions };
        }
        return defaultRound;
      });
    }
  } catch(e) {
    console.error('Erreur chargement boutique:', e);
  }
}

// Sauvegarder les questions d'une manche pour cette boutique
async function saveBoutiqueRounds() {
  if (!boutiqueId || !FIREBASE_CONFIGURED) return;
  const toSave = ROUNDS.map(r => ({ questions: r.questions }));
  await db.ref(`boutiques/${boutiqueId}/rounds`).set(toSave);
  await db.ref(`boutiques/${boutiqueId}/name`).set(boutiqueName);
}

// Créer ou récupérer l'ID boutique
async function setupBoutique(name) {
  // On crée un ID simple basé sur le nom (lowercase, sans espaces)
  const id = name.toLowerCase().replace(/[^a-z0-9]/g, '_').substring(0, 30);
  boutiqueId = id;
  boutiqueName = name;
  localStorage.setItem('chloe_boutique_id', id);
  localStorage.setItem('chloe_boutique_name', name);
  // Vérifier si la boutique existe déjà
  const snap = await db.ref(`boutiques/${id}`).once('value');
  if (!snap.exists()) {
    // Nouvelle boutique : sauvegarder les questions par défaut
    await saveBoutiqueRounds();
  } else {
    // Boutique existante : charger ses questions
    await loadBoutiqueRounds();
  }
}

// Compter total questions (dynamique car ROUNDS peut changer)
let TOTAL_QUESTIONS = ROUNDS.reduce((sum, r) => sum + r.questions.length, 0);
function refreshTotalQuestions() {
  TOTAL_QUESTIONS = ROUNDS.reduce((sum, r) => sum + r.questions.length, 0);
}

// Convertir indice global -> manche + index dans manche
function globalIndexToRound(globalIdx) {
  let acc = 0;
  for (let r = 0; r < ROUNDS.length; r++) {
    if (globalIdx < acc + ROUNDS[r].questions.length) {
      return { roundIdx: r, qIdx: globalIdx - acc, round: ROUNDS[r] };
    }
    acc += ROUNDS[r].questions.length;
  }
  return null;
}

const generateGameCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();
const generatePlayerId = () => 'p_' + Math.random().toString(36).substring(2, 10);
const $ = (id) => document.getElementById(id);
const el = (tag, attrs = {}, ...children) => {
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else if (k.startsWith('on')) e.addEventListener(k.substring(2), v);
    else if (v !== null && v !== undefined && v !== false) e.setAttribute(k, v);
  });
  children.forEach(c => {
    if (c === null || c === undefined || c === false) return;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
};

// 🧠 STATE
// ============================================================
let currentView = 'home';

let gameStateListener = null;

// ============================================================
// 🎨 RENDER

function render() {
  const app = $('app');

  else if (currentView === 'boutique-setup') app.appendChild(renderBoutiqueSetup());
  else if (currentView === 'editor') app.appendChild(renderEditor());
  else if (currentView === 'master-setup') app.appendChild(renderMasterSetup());
  else if (currentView === 'master-game') app.appendChild(renderMasterGame());
  else if (currentView === 'player-join') app.appendChild(renderPlayerJoin());
  else if (currentView === 'player-game') app.appendChild(renderPlayerGame());
}

function goTo(view) {
  if (gameStateListener) {
    db.ref('games/' + gameCode).off('value', gameStateListener);
    gameStateListener = null;
  }
  currentView = view;
  render();
}

// === HOME ===

// === BOUTIQUE SETUP ===
function renderBoutiqueSetup() {
  const nameInput = el('input', {
    class: 'input',
    type: 'text',
    placeholder: 'Ex : Paris Saint-Honoré',
    maxlength: 40,
    value: boutiqueName || '',
  });
  let errorDiv = null;

  const handleSave = async () => {
    const name = nameInput.value.trim();
    if (!name) { showErr('Entre le nom de ta boutique'); return; }
    try {
      await setupBoutique(name);
      refreshTotalQuestions();
      goTo('home');
    } catch(e) {
      showErr('Erreur : ' + e.message);
    }
  };

  const showErr = (msg) => {
    if (errorDiv) errorDiv.remove();
    errorDiv = el('div', { class: 'error' }, msg);
    inner.insertBefore(errorDiv, saveBtn);
  };

  const saveBtn = el('button', { class: 'btn-primary', onclick: handleSave },
    el('span', { class: 'btn-main' }, boutiqueName ? 'METTRE À JOUR' : 'CRÉER MON PROFIL')
  );

  const inner = el('div', { class: 'screen-inner' },
    el('h2', { class: 'screen-title' }, '🏪 Ma boutique'),
    el('p', { class: 'screen-text' },

        : 'Crée un profil boutique pour personnaliser tes questions et les retrouver à chaque session.'

    el('div', { class: 'form-group' },
      el('label', { class: 'label' }, 'NOM DE LA BOUTIQUE'),
      nameInput

    saveBtn,
    boutiqueName && el('button', {
      class: 'btn-secondary',
      style: 'margin-top:12px',
      onclick: () => goTo('editor')
    },
      el('span', { class: 'btn-main' }, '✏️ Modifier mes questions')
    ),
    boutiqueName && el('button', {
      class: 'boutique-btn',
      style: 'margin-top:20px; color:#8B0000;',
      onclick: async () => {
        if (confirm(`Supprimer définitivement le profil "${boutiqueName}" et toutes ses questions ?`)) {
          try {
            await db.ref(`boutiques/${boutiqueId}`).remove();
            boutiqueId = null;
            boutiqueName = null;
            localStorage.removeItem('chloe_boutique_id');
            localStorage.removeItem('chloe_boutique_name');
            ROUNDS = JSON.parse(JSON.stringify(DEFAULT_ROUNDS));
            refreshTotalQuestions();
            goTo('home');
          } catch(e) {
            alert('Erreur : ' + e.message);
          }
        }
      }
    }, '🗑 Supprimer ce profil boutique'),
    el('button', {
      class: 'boutique-btn',

// === ÉDITEUR DE QUESTIONS ===
function renderEditor() {
  const inner = el('div', { class: 'screen-inner' });
  inner.appendChild(el('h2', { class: 'screen-title' }, '✏️ Mes questions'));
  inner.appendChild(el('p', { class: 'screen-text' }, 'Modifie les questions de chaque manche. Les changements sont sauvegardés automatiquement pour ta boutique.'));

  // Tabs manches
  let activeRoundIdx = 0;
  const tabsContainer = el('div', { class: 'editor-tabs' });
  const contentContainer = el('div', {});

  const renderEditorContent = () => {
    contentContainer.innerHTML = '';
    const round = ROUNDS[activeRoundIdx];

    // Questions existantes
    round.questions.forEach((q, qIdx) => {
      const qCard = el('div', { class: 'editor-card' });
      qCard.appendChild(el('div', { class: 'editor-card-header' },
        el('span', { class: 'editor-card-num' }, `Q${qIdx + 1}`),
        el('button', { class: 'editor-delete-btn', onclick: async () => {
          if (confirm('Supprimer cette question ?')) {
            ROUNDS[activeRoundIdx].questions.splice(qIdx, 1);
            refreshTotalQuestions();
            await saveBoutiqueRounds();
            renderEditorContent();
          }
        }}, '✕')
      ));

      if (round.type === 'buzz_factual') {
        qCard.appendChild(renderField('Question', q.q, v => { q.q = v; }));
        qCard.appendChild(renderField('Réponse', q.a, v => { q.a = v; }));
        qCard.appendChild(renderField('Indice (optionnel)', q.hint || '', v => { q.hint = v; }));
      } else if (round.type === 'buzz_emotion') {
        qCard.appendChild(renderField('Émotion', q.emotion, v => { q.emotion = v; }));
        qCard.appendChild(renderField('Description', q.description, v => { q.description = v; }));
        qCard.appendChild(renderField('Réponse (sac)', q.a, v => { q.a = v; }));
      } else if (round.type === 'buzz_free') {
        qCard.appendChild(renderField('Sac concerné', q.bag, v => { q.bag = v; }));
        qCard.appendChild(renderField('Objection cliente', q.cliente, v => { q.cliente = v; }));
        qCard.appendChild(renderField('Éléments de réponse', q.keyPoints, v => { q.keyPoints = v; }));
      } else if (round.type === 'draw_pitch') {
        qCard.appendChild(renderField('Sac', q.bag, v => { q.bag = v; }));
        qCard.appendChild(renderField('Émotion', q.emotion || '', v => { q.emotion = v; }));
        qCard.appendChild(renderField('Indice', q.hint || '', v => { q.hint = v; }));
      }

      // Bouton sauvegarder cette question
      qCard.appendChild(el('button', { class: 'editor-save-btn', onclick: async () => {
        await saveBoutiqueRounds();
        const btn = qCard.querySelector('.editor-save-btn');
        btn.textContent = '✓ Sauvegardé !';
        setTimeout(() => { btn.textContent = 'Sauvegarder'; }, 1500);
      }}, 'Sauvegarder'));

      contentContainer.appendChild(qCard);
    });

    // Bouton ajouter question
    contentContainer.appendChild(el('button', { class: 'editor-add-btn', onclick: async () => {
      const round = ROUNDS[activeRoundIdx];
      if (round.type === 'buzz_factual') round.questions.push({ q: '', a: '', hint: '' });
      else if (round.type === 'buzz_emotion') round.questions.push({ emotion: '', description: '', a: '', indices: [] });
      else if (round.type === 'buzz_free') round.questions.push({ bag: '', cliente: '', keyPoints: '', motsCles: [] });
      else if (round.type === 'draw_pitch') round.questions.push({ bag: '', emotion: '', hint: '' });
      refreshTotalQuestions();
      await saveBoutiqueRounds();
      renderEditorContent();
    }}, '+ Ajouter une question'));

    // Bouton reset manche
    contentContainer.appendChild(el('button', { class: 'editor-reset-btn', onclick: async () => {
      if (confirm('Remettre les questions par défaut pour cette manche ?')) {
        ROUNDS[activeRoundIdx].questions = JSON.parse(JSON.stringify(DEFAULT_ROUNDS[activeRoundIdx].questions));
        refreshTotalQuestions();
        await saveBoutiqueRounds();
        renderEditorContent();
      }
    }}, '↺ Remettre les questions par défaut'));
  };

  // Render tabs
  const renderTabs = () => {
    tabsContainer.innerHTML = '';
    ROUNDS.forEach((r, i) => {
      tabsContainer.appendChild(el('button', {
        class: 'editor-tab' + (i === activeRoundIdx ? ' active' : ''),
        onclick: () => { activeRoundIdx = i; renderTabs(); renderEditorContent(); }
      }, r.shortName));
    });
  };

  renderTabs();
  renderEditorContent();

  inner.appendChild(el('div', { class: 'label', style: 'margin-bottom:8px' }, 'SÉLECTIONNE UNE MANCHE'));
  inner.appendChild(tabsContainer);
  inner.appendChild(contentContainer);
  inner.appendChild(el('button', { class: 'boutique-btn', style: 'margin-top:24px', onclick: () => goTo('boutique-setup') }, '← Retour'));

  return el('div', { class: 'screen', style: 'padding-bottom:60px' }, inner);
}

// Champ éditable

// === MASTER GAME ===
function renderMasterGame() {
  if (!gameStateListener && FIREBASE_CONFIGURED) {
    gameStateListener = (snapshot) => {
      currentGameState = snapshot.val();
      renderMasterGameContent();
    };
    db.ref('games/' + gameCode).on('value', gameStateListener);
  }
  const container = el('div', { class: 'master-screen', id: 'master-game-content' });
  if (!currentGameState) {
    container.appendChild(el('div', { class: 'loading' },
      el('div', { class: 'spinner' }),
      el('div', {}, 'Chargement…')
    ));
  }
  return container;
}

function renderMasterGameContent() {
  const container = $('master-game-content');
  if (!container || !currentGameState) return;

  const state = currentGameState;
  container.innerHTML = '';

  if (state.finished) {
    renderEndScreen(container, state, false);
    return;
  }

  const ctx = globalIndexToRound(state.globalQuestionIdx);
  if (!ctx) { renderEndScreen(container, state, false); return; }
  const { roundIdx, qIdx, round } = ctx;
  const question = round.questions[qIdx];
  const players = Object.values(state.players || {});
  const buzz = state.buzz;
  const buzzPlayer = buzz ? state.players[buzz.playerId] : null;
  const scores = state.scores || {};

  // Header
  container.appendChild(el('div', { class: 'master-header' },
    el('div', {},
      el('div', { class: 'code-label' }, 'CODE'),
      el('div', { class: 'code-value' }, gameCode)
    ),
    el('button', { class: 'share-btn', onclick: handleShare }, '📤 PARTAGER')
  ));

  // Players bar
  container.appendChild(el('div', { class: 'players-bar' },
    el('span', { class: 'players-dot' }, '●'),
    `${players.length} participant${players.length > 1 ? 's' : ''}`,
    players.length > 0 && el('span', { class: 'players-list' }, ' · ' + players.map(p => p.name).join(', '))
  ));

  container.appendChild(el('div', { class: 'round-banner' },
    el('div', { class: 'round-banner-left' },
      el('div', { class: 'round-banner-name' }, `Manche ${roundIdx + 1} · ${round.shortName}`)
    ),
    el('div', { class: 'round-banner-prog' }, `${qIdx + 1}/${round.questions.length}`)
  ));
  
  // Consignes maître du jeu : S'affiche UNIQUEMENT au début de la manche (qIdx === 0)
  if (qIdx === 0) {
    container.appendChild(
      el('div', { class: 'master-instructions' },
        el('div', { class: 'master-instructions-label' }, 'À LIRE À VOIX HAUTE'),
        el('div', { class: 'master-instructions-text' }, round.description)
      )
    );
  }

  // Progress bar
  container.appendChild(el('div', { class: 'progress-bar' },
    el('div', { class: 'progress-fill', style: `width: ${((state.globalQuestionIdx + 1) / TOTAL_QUESTIONS) * 100}%` })
  ));

  // ============ AFFICHAGE PAR TYPE DE MANCHE ============
  if (round.type === 'buzz_factual') {
    renderRound1(container, question, state, buzz, buzzPlayer);
  } else if (round.type === 'buzz_emotion') {
    renderRound2(container, question, state, buzz, buzzPlayer);
  } else if (round.type === 'buzz_free') {
    renderRound3(container, question, state, buzz, buzzPlayer, players);
  } else if (round.type === 'draw_pitch') {
    renderRound4(container, question, state, players, qIdx, round);
  }

  // Navigation controls (sauf manche 4 où c'est différent)
  if (round.type !== 'draw_pitch' || state.revealed) {
    renderControls(container, state);
  } else {
    renderControlsRound4(container, state);
  }

  // Scores panel
  if (players.length > 0) {
    renderScoresPanel(container, players, scores);
  }
}

// === MANCHE 4 — TIRAGE + PITCH (ÉPURÉ SANS LOGO/AMPOULE) ===
function renderRound4(container, question, state, players, qIdx, round) {
  const assignments = state.assignments || {};
  const assignedPlayerIds = Object.values(assignments);
  const availablePlayers = players.filter(p => !assignedPlayerIds.includes(p.id));

  const currentBag = question.bag;
  const drawnPlayerId = assignments[currentBag];
  // Si le joueur tiré s'est déconnecté, on considère le sac comme non-attribué (re-tirage possible)
  const drawnPlayer = (drawnPlayerId && state.players && state.players[drawnPlayerId]) ? state.players[drawnPlayerId] : null;

  const drawArea = el('div', { class: 'draw-area' });
  
  drawArea.appendChild(el('div', { class: 'draw-label' }, 'LE SAC À VENDRE'));
  drawArea.appendChild(el('div', { class: 'draw-bag' }, currentBag));
  
  drawArea.appendChild(el('div', { class: 'draw-arrow' }, '↓'));
  drawArea.appendChild(el('div', { class: 'draw-label' }, drawnPlayer ? 'PARTICIPANT·E TIRÉ·E' : 'EN ATTENTE DU TIRAGE'));
  drawArea.appendChild(el('div', { class: 'draw-player' + (state.drawing ? ' shimmer' : '') },
    drawnPlayer ? drawnPlayer.name : (state.drawing ? 'Tirage en cours…' : '— —')
  ));

  if (!drawnPlayer) {
    if (availablePlayers.length === 0) {
      drawArea.appendChild(el('div', { class: 'question-desc', style: 'color:#FBF7F0; opacity:0.8; margin-top:12px' },
        'Tous les participants ont déjà eu un sac. Tu peux passer cette question.'));
    } else {
      drawArea.appendChild(el('button', {
        class: 'draw-btn',
        onclick: () => drawPlayer(currentBag, availablePlayers),
        disabled: state.drawing
      }, state.drawing ? 'TIRAGE…' : `🎲 TIRER AU SORT (parmi ${availablePlayers.length})`));
    }
  } else {
    // Exemple de pitch — visible pour le maître seulement
    if (question.exemple) {
      drawArea.appendChild(el('div', { style: 'background:rgba(251,247,240,0.1);border:1px solid rgba(251,247,240,0.3);padding:14px;margin-top:16px;margin-bottom:4px;' },
        el('div', { style: 'font-size:9px;letter-spacing:2px;opacity:0.7;margin-bottom:6px;font-weight:700;' }, 'EXEMPLE DE BONNE PHRASE'),
        el('div', { style: 'font-family:"Cormorant Garamond",serif;font-style:italic;font-size:17px;color:#FBF7F0;line-height:1.4;' },
          `"${question.exemple}"`)
      ));
    }
    drawArea.appendChild(el('button', {
      class: 'draw-btn',
      onclick: () => awardPointR4(drawnPlayerId)
    }, `✓ EXCELLENT PITCH — +1 POINT À ${drawnPlayer.name.toUpperCase()}`));
    drawArea.appendChild(el('button', {
      class: 'draw-btn',
      style: 'background:#FBF7F0;border:1.5px solid #FBF7F0;margin-top:6px',
      onclick: () => skipPitchR4()
    }, 'PASSER (pas de point)'));
    drawArea.appendChild(el('button', {
      class: 'draw-btn',
      style: 'background:transparent;border:1px solid rgba(251,247,240,0.4);color:#FBF7F0;margin-top:6px;font-size:11px',
      onclick: () => redrawPlayer(currentBag)
    }, '🔄 RE-TIRER UN·E AUTRE PARTICIPANT·E'));
  }

  container.appendChild(drawArea);
}

function renderScoresPanel(container, players, scores) {
  const sorted = [...players].sort((a, b) => (scores[b.id] || 0) - (scores[a.id] || 0));
  const panel = el('div', { class: 'scores-panel' },
    el('div', { class: 'scores-panel-header' },
      el('span', {}, 'SCORES EN DIRECT'),
      el('button', { class: 'reset-btn', onclick: resetScores }, 'RESET')
    )
  );
  sorted.forEach((p, i) => {
    panel.appendChild(el('div', { class: 'score-row-live' },
      el('span', { class: 'score-rank' }, (i + 1).toString()),
      el('span', { class: 'score-name' }, p.name),
      el('div', { class: 'point-controls' },
        el('button', { class: 'point-btn', onclick: () => awardPoint(p.id, -1) }, '−'),
        el('button', { class: 'point-btn', onclick: () => awardPoint(p.id, 1) }, '+')
      ),
      el('span', { class: 'score-value-live' }, scores[p.id] || 0)
    ));
  });
  container.appendChild(panel);
}

// === ACTIONS MASTER ===
async function handleShare() {
  const url = `${window.location.origin}${window.location.pathname}?code=${gameCode}`;
  const text = `🎯 Rejoins le Morning Brief Chloé !\n\n📱 ${url}\n🔑 Code : ${gameCode}`;
  if (navigator.share) {
    try { await navigator.share({ title: 'Morning Brief Chloé', text }); } catch(e) {}
  } else {
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
  }
}
async function revealAnswer() {
  await db.ref('games/' + gameCode).update({ revealed: true });
}
async function nextQuestion() {
  const state = currentGameState;
  if (state.globalQuestionIdx < TOTAL_QUESTIONS - 1) {
    await db.ref('games/' + gameCode).update({
      globalQuestionIdx: state.globalQuestionIdx + 1,
      buzz: null,
      revealed: false,
    });
  } else {
    await db.ref('games/' + gameCode).update({ finished: true });
  }
}
async function prevQuestion() {
  const state = currentGameState;
  if (state.globalQuestionIdx > 0) {
    await db.ref('games/' + gameCode).update({
      globalQuestionIdx: state.globalQuestionIdx - 1,
      buzz: null,
      revealed: false,
    });
  }
}
async function awardPoint(pid, points) {
  const state = currentGameState;
  const newScores = { ...(state.scores || {}) };
  newScores[pid] = Math.max(0, (newScores[pid] || 0) + points);
  // Tracker par manche
  const ctx = globalIndexToRound(state.globalQuestionIdx);
  const roundKey = ctx ? `r${ctx.roundIdx + 1}` : 'r1';
  const newRoundScores = { ...(state.roundScores || {}) };
  if (!newRoundScores[pid]) newRoundScores[pid] = {};
  if (points > 0) newRoundScores[pid][roundKey] = (newRoundScores[pid][roundKey] || 0) + points;
  await db.ref('games/' + gameCode).update({ scores: newScores, roundScores: newRoundScores, buzz: null });
}
async function awardPointR3(pid) {
  const state = currentGameState;
  const newScores = { ...(state.scores || {}) };
  newScores[pid] = (newScores[pid] || 0) + 1;
  const newRoundScores = { ...(state.roundScores || {}) };
  if (!newRoundScores[pid]) newRoundScores[pid] = {};
  newRoundScores[pid]['r3'] = (newRoundScores[pid]['r3'] || 0) + 1;
  await db.ref('games/' + gameCode).update({ scores: newScores, roundScores: newRoundScores, buzz: null });
}
async function rejectBuzz() {
  await db.ref('games/' + gameCode).update({ buzz: null });
}
async function resetScores() {
  if (confirm('Réinitialiser tous les scores ?')) {
    await db.ref('games/' + gameCode).update({ scores: {} });
  }
}

// Manche 4 : tirage au sort
async function drawPlayer(bag, availablePlayers) {
  await db.ref('games/' + gameCode).update({ drawing: true });
  setTimeout(async () => {
    const idx = Math.floor(Math.random() * availablePlayers.length);
    const chosen = availablePlayers[idx];
    // Transaction sur assignments pour éviter d'écraser une attribution concurrente
    await db.ref('games/' + gameCode + '/assignments').transaction((current) => {
      const a = current || {};
      a[bag] = chosen.id;
      return a;
    });
    await db.ref('games/' + gameCode).update({ drawing: false });
  }, 1500);
}

async function awardPointR4(pid) {
  const state = currentGameState;
  const newScores = { ...(state.scores || {}) };
  newScores[pid] = (newScores[pid] || 0) + 1;
  const newRoundScores = { ...(state.roundScores || {}) };
  if (!newRoundScores[pid]) newRoundScores[pid] = {};
  newRoundScores[pid]['r4'] = (newRoundScores[pid]['r4'] || 0) + 1;
  await db.ref('games/' + gameCode).update({ scores: newScores, roundScores: newRoundScores });
  setTimeout(() => nextQuestion(), 800);
}

async function skipPitchR4() {
  await nextQuestion();
}

// Manche 4 : re-tirer (efface l'assignation du sac courant)
async function redrawPlayer(bag) {
  await db.ref('games/' + gameCode + '/assignments/' + bag).remove();
}

// === PLAYER JOIN ===
function renderPlayerJoin() {
  let errorDiv = null;
  const nameInput = el('input', { class: 'input', type: 'text', placeholder: 'Ex : Marie', maxlength: 20, value: playerName });
  const codeInput = el('input', { class: 'input input-code', type: 'text', placeholder: 'ABC123', maxlength: 6, value: gameCode });

  const handleJoin = async () => {
    if (!FIREBASE_CONFIGURED) { alert("Firebase non configuré."); return; }
    const name = nameInput.value.trim();
    const code = codeInput.value.trim().toUpperCase();
    if (!name || !code) { showError('Renseigne ton nom et le code'); return; }
    try {
      const snapshot = await db.ref('games/' + code).once('value');
      if (!snapshot.exists()) { showError('Code invalide'); return; }
      const player = { id: playerId, name, joinedAt: Date.now() };
      await db.ref(`games/${code}/players/${playerId}`).set(player);
      playerName = name;
      gameCode = code;
      goTo('player-game');
    } catch (err) { showError('Erreur : ' + err.message); }
  };

  const showError = (msg) => {
    if (errorDiv) errorDiv.remove();
    errorDiv = el('div', { class: 'error' }, msg);
    container.insertBefore(errorDiv, button);
  };

  const button = el('button', { class: 'btn-primary', onclick: handleJoin },
    el('span', { class: 'btn-main' }, 'ENTRER DANS LA PARTIE')
  );

  const container = el('div', { class: 'screen-inner' },
    el('h2', { class: 'screen-title' }, 'REJOINDRE'),
    el('p', { class: 'screen-text' }, 'Entre ton prénom et le code de la partie.'),
    el('div', { class: 'form-group' }, el('label', { class: 'label' }, 'TON PRÉNOM'), nameInput),
    el('div', { class: 'form-group' }, el('label', { class: 'label' }, 'CODE DE LA PARTIE'), codeInput),
    button
  );

  return el('div', { class: 'screen' }, container);
}

function renderPlayerGameContent() {

  const state = currentGameState;
  container.innerHTML = '';

  if (state.finished) {
    renderEndScreen(container, state, true);
    return;
  }

  const ctx = globalIndexToRound(state.globalQuestionIdx);
  if (!ctx) { renderEndScreen(container, state, true); return; }
  const { roundIdx, qIdx, round } = ctx;
  const question = round.questions[qIdx];
  const scores = state.scores || {};
  const myScore = scores[playerId] || 0;
  const isMyBuzz = state.buzz?.playerId === playerId;
  const someoneElseBuzzed = state.buzz && !isMyBuzz;

  // Header
  container.appendChild(el('div', { class: 'player-header' },
    el('div', {},
      el('div', { class: 'player-name-label' }, 'JOUEUR'),
      el('div', { class: 'player-name-value' }, playerName)
    ),
    el('div', { class: 'player-score-box' },
      el('div', { class: 'player-score-label' }, 'SCORE'),
      el('div', { class: 'player-score-value' }, myScore)
    )
  ));

  // Round banner
  container.appendChild(el('div', { class: 'player-round-banner' },
    el('div', { class: 'player-round-name' }, `Manche ${roundIdx + 1} · ${round.shortName}`),
    el('div', { class: 'player-round-prog' }, `${qIdx + 1}/${round.questions.length}`)
  ));

  // Question card (masquée)
  const card = el('div', { class: 'player-question-card' });
  const labels = {
    'buzz_factual': 'QUIZ EXPRESS',
    'buzz_emotion': 'DEVINE LE SAC',
    'buzz_free': 'OBJECTION CLIENTE',
    'draw_pitch': 'PITCH ÉMOTIONNEL'
  };
  card.appendChild(el('div', { class: 'question-tag' }, labels[round.type] || 'QUESTION'));
  card.appendChild(el('div', { class: 'player-listen' },
    el('div', { class: 'listen-icon' }, '👂'),
    el('div', { class: 'listen-text' }, 'Écoute le maître du jeu')
  ));
  const hints = {
    'buzz_factual': 'Une question factuelle sur un sac · Buzz dès que tu sais',
    'buzz_emotion': 'Une émotion + des indices · Trouve le sac qui correspond',
    'buzz_free': 'Une objection cliente · Réponse libre, propose ta meilleure réponse',
    'draw_pitch': 'Vends un sac en 1 phrase émotionnelle si tu es tiré·e'
  };
  card.appendChild(el('div', { class: 'player-hint' }, hints[round.type]));
  container.appendChild(card);

  /* ============ ZONE BUZZ / TIRAGE ============ */
  const buzzerArea = el('div', { class: 'buzzer-area' });

  if (round.type === 'draw_pitch') {
    const assignments = state.assignments || {};
    const drawnPlayerId = assignments[question.bag];
    const isMeDrawn = drawnPlayerId === playerId;

    if (isMeDrawn) {
      const subText = question.emotion 
        ? el('div', { class: 'player-chosen-sub' }, 'Vends ce sac en 1 phrase émotionnelle, à voix haute. Inspire-toi de l\'émotion : ', el('strong', {}, question.emotion))
        : el('div', { class: 'player-chosen-sub' }, 'Vends ce sac en 1 phrase émotionnelle à voix haute ! Propose l\'émotion de ton choix.');

      buzzerArea.appendChild(el('div', { class: 'player-chosen' },
        el('div', { class: 'player-chosen-icon' }, '🎯'),
        el('div', { class: 'player-chosen-text' }, 'C\'EST À TOI !'),
        el('div', { class: 'player-chosen-bag' }, question.bag),
        subText
      ));
    } else if (drawnPlayerId) {
      const drawnPlayer = state.players[drawnPlayerId];
      buzzerArea.appendChild(el('div', { class: 'player-waiting-draw' },
        el('div', { class: 'player-waiting-icon' }, '👂'),
        el('div', { class: 'player-waiting-text' }, drawnPlayer ? drawnPlayer.name + ' pitche' : 'Pitch en cours'),
        el('div', { class: 'player-waiting-sub' }, 'Écoute son pitch émotionnel')
      ));
    } else if (state.drawing) {
      buzzerArea.appendChild(el('div', { class: 'player-waiting-draw' },
        el('div', { class: 'player-waiting-icon' }, '🎲'),
        el('div', { class: 'player-waiting-text' }, 'Tirage en cours…'),
        el('div', { class: 'player-waiting-sub' }, 'Qui sera tiré·e ?')
      ));
    } else {
      buzzerArea.appendChild(el('div', { class: 'player-waiting-draw' },
        el('div', { class: 'player-waiting-icon' }, '🎲'),
        el('div', { class: 'player-waiting-text' }, 'En attente du tirage'),
        el('div', { class: 'player-waiting-sub' }, 'Le maître du jeu va tirer un·e participant·e')
      ));
    }
  } else {
    if (state.revealed) {
      buzzerArea.appendChild(el('div', { class: 'revealed-message' },
        el('div', { class: 'revealed-icon' }, '👁'),
        el('div', {}, 'Réponse révélée'),
        el('div', { class: 'revealed-sub' }, 'En attente de la prochaine question…')
      ));
    } else if (isMyBuzz) {
      buzzerArea.appendChild(el('div', { class: 'my-buzz-message' },
        el('div', { class: 'my-buzz-icon' }, '🔔'),
        el('div', { class: 'my-buzz-text' }, 'TU AS BUZZÉ !'),
        el('div', { class: 'my-buzz-sub' },
          round.type === 'buzz_free' ? 'Donne ta meilleure réponse à voix haute' : 'Donne ta réponse à voix haute')
      ));
    } else if (someoneElseBuzzed) {
      buzzerArea.appendChild(el('div', { class: 'other-buzz-message' },
        el('div', { class: 'other-buzz-icon' }, '⏸'),
        el('div', { class: 'other-buzz-text' }, state.buzz.playerName + ' a buzzé')
      ));
    } else {
      const btn = el('button', { class: 'buzzer-btn', onclick: handleBuzz, disabled: buzzedLocally },
        el('div', { class: 'buzzer-inner' },
          el('div', { class: 'buzzer-label' }, 'BUZZ'),
          el('div', { class: 'buzzer-sub-label' }, 'Appuie pour répondre')
        )
      );
      buzzerArea.appendChild(btn);
    }
  }
  container.appendChild(buzzerArea);
}

// === SON DE BUZZ ===
function playBuzzSound() {
  try {
    const audio = new Audio('/chloe-quiz/buzz.mp3');
    audio.volume = 0.8;
    audio.play().catch(() => {});
  } catch(e) {}
}

async function handleBuzz() {
  if (buzzedLocally || currentGameState?.buzz) return;
  buzzedLocally = true;
  playBuzzSound();
  if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
  renderPlayerGameContent();
  try {
    const result = await db.ref('games/' + gameCode + '/buzz').transaction((current) => {
      if (current === null) return { playerId, playerName, time: Date.now() };
      return;
    });
    if (!result.committed) {
      buzzedLocally = false;
      renderPlayerGameContent();
    }
  } catch (err) {
    buzzedLocally = false;
    renderPlayerGameContent();
  }
}

// === END SCREEN ===
// Définition des skills par manche
const ROUND_SKILLS = {
  r1: { label: 'Connaissance produit', icon: '📚', tip: 'Revois les fiches produits — dates de lancement, matières, signatures, chiffres clés de chaque sac.' },
  r2: { label: 'Lien sac-émotion', icon: '💛', tip: 'Entraîne-toi à associer chaque sac à son émotion : Spin = Effortless, Paddington = Nostalgie, Marcie = Sérénité, Bracelet = Séduction, Summer Banana = Holidays, Plissé = Boldness.' },
  r3: { label: 'Gestion des objections', icon: '🎯', tip: 'Travaille les réponses aux objections clientes : valorise le design, le savoir-faire, l\'histoire du sac plutôt que de défendre.' },
  r4: { label: 'Storytelling & discours de vente', icon: '✨', tip: 'Entraîne-toi à vendre une émotion, pas un produit. Une phrase, une image, un sentiment — c\'est ça qui fait la différence.' },
};

function renderEndScreen(container, state, isPlayer) {
  container.className = 'screen';
  const inner = el('div', { class: 'screen-inner' });
  const sorted = Object.values(state.players || {}).sort(
    (a, b) => (state.scores?.[b.id] || 0) - (state.scores?.[a.id] || 0)
  );

  if (isPlayer) {
    const myScore = state.scores?.[playerId] || 0;
    const myRank = sorted.findIndex(p => p.id === playerId) + 1;
    const myRoundScores = state.roundScores?.[playerId] || {};

    inner.appendChild(el('h2', { class: 'screen-title' }, '🏆 Partie terminée'));

    // Résultat global
    inner.appendChild(el('div', { class: 'my-result' },
      el('div', { class: 'my-result-label' }, 'TON RÉSULTAT'),
      el('div', { class: 'my-result-rank' }, '#' + myRank),
      el('div', { class: 'my-result-score' }, myScore + ' point' + (myScore > 1 ? 's' : ''))
    ));

    // Feedback personnalisé
    const feedbackBox = el('div', { class: 'feedback-box' });
    feedbackBox.appendChild(el('div', { class: 'feedback-title' }, '📋 TON FEEDBACK PERSONNALISÉ'));

    // Calcul des manches où le joueur n'a pas marqué
    const totalByRound = { r1: 8, r2: 6, r3: 4, r4: 6 };
    const toImprove = [];
    const strong = [];

    Object.entries(ROUND_SKILLS).forEach(([key, skill]) => {
      const got = myRoundScores[key] || 0;
      const total = totalByRound[key];
      const ratio = got / total;
      if (ratio === 0) toImprove.push({ key, skill, got, total, level: 'À travailler' });
      else if (ratio < 0.5) toImprove.push({ key, skill, got, total, level: 'À renforcer' });
      else strong.push({ key, skill, got, total });
    });

    // Points forts
    if (strong.length > 0) {
      feedbackBox.appendChild(el('div', { class: 'feedback-section-label green' }, '✅ TES POINTS FORTS'));
      strong.forEach(({ skill, got, total }) => {
        feedbackBox.appendChild(el('div', { class: 'feedback-item strong' },
          el('div', { class: 'feedback-item-top' },
            el('span', { class: 'feedback-icon' }, skill.icon),
            el('span', { class: 'feedback-skill' }, skill.label),
            el('span', { class: 'feedback-pts' }, `${got}/${total}`)
          )
        ));
      });
    }

    // À améliorer
    if (toImprove.length > 0) {
      feedbackBox.appendChild(el('div', { class: 'feedback-section-label orange' }, '💪 À TRAVAILLER'));
      toImprove.forEach(({ skill, got, total, level }) => {
        feedbackBox.appendChild(el('div', { class: 'feedback-item improve' },
          el('div', { class: 'feedback-item-top' },
            el('span', { class: 'feedback-icon' }, skill.icon),
            el('span', { class: 'feedback-skill' }, skill.label),
            el('span', { class: 'feedback-pts' }, `${got}/${total}`)
          ),
          el('div', { class: 'feedback-tip' }, skill.tip)
        ));
      });
    }

    if (toImprove.length === 0) {
      feedbackBox.appendChild(el('div', { class: 'feedback-perfect' },
        '🌟 Excellent sur toutes les manches — tu maîtrises parfaitement !'
      ));
    }

    inner.appendChild(feedbackBox);

    // Classement complet
    const scoresList = el('div', { class: 'all-scores' },
      el('div', { class: 'feedback-section-label' }, 'CLASSEMENT')
    );
    sorted.forEach((p, i) => {
      scoresList.appendChild(el('div', { class: 'score-row' + (p.id === playerId ? ' score-row-me' : '') },
        el('span', {}, `${i + 1}. ${p.name}${p.id === playerId ? ' (toi)' : ''}`),
        el('span', { class: 'score-value' }, state.scores?.[p.id] || 0)
      ));
    });
    inner.appendChild(scoresList);

  } else {
    // VUE MAÎTRE DU JEU
    inner.appendChild(el('h2', { class: 'screen-title' }, '🏆 Fin de la partie'));
    const podium = el('div', { class: 'podium' });
    sorted.slice(0, 3).forEach((p, i) => {
      podium.appendChild(el('div', { class: 'podium-player' + (i === 0 ? ' podium-first' : '') },
        el('div', { class: 'podium-rank' }, ['🥇', '🥈', '🥉'][i]),
        el('div', { class: 'podium-name' }, p.name),
        el('div', { class: 'podium-score' }, (state.scores?.[p.id] || 0) + ' pts')
      ));
    });
    inner.appendChild(podium);

    // Tableau des scores par manche pour le maître
    const masterFeedback = el('div', { class: 'master-feedback' });
    masterFeedback.appendChild(el('div', { class: 'feedback-title' }, '📊 DÉTAIL PAR MANCHE'));

    sorted.forEach((p) => {
      const rs = state.roundScores?.[p.id] || {};
      const row = el('div', { class: 'master-feedback-row' },
        el('div', { class: 'master-feedback-name' }, p.name),
        el('div', { class: 'master-feedback-rounds' },
          ...Object.entries(ROUND_SKILLS).map(([key, skill]) =>
            el('div', { class: 'master-feedback-cell' },
              el('div', { class: 'mfc-icon' }, skill.icon),
              el('div', { class: 'mfc-score' }, (rs[key] || 0))
            )
          )
        )
      );
      masterFeedback.appendChild(row);
    });

    // Légende
    const legend = el('div', { class: 'master-feedback-legend' });
    Object.entries(ROUND_SKILLS).forEach(([, skill]) => {
      legend.appendChild(el('span', { class: 'legend-item' }, `${skill.icon} ${skill.label}`));
    });
    masterFeedback.appendChild(legend);
    inner.appendChild(masterFeedback);

    const scoresList = el('div', { class: 'all-scores' });
    sorted.forEach((p, i) => {
      scoresList.appendChild(el('div', { class: 'score-row' },
        el('span', {}, `${i + 1}. ${p.name}`),
        el('span', { class: 'score-value' }, state.scores?.[p.id] || 0)
      ));
    });
    inner.appendChild(scoresList);

    inner.appendChild(el('button', { class: 'btn-secondary', onclick: () => {
      if (gameStateListener) {
        db.ref('games/' + gameCode).off('value', gameStateListener);
        gameStateListener = null;
      }
      currentGameState = null;
      buzzedLocally = false;
      gameCode = '';
      goTo('home');
    } },
      el('span', { class: 'btn-main' }, 'NOUVELLE PARTIE')
    ));
  }

  container.innerHTML = '';
  container.appendChild(inner);
}

// === INIT ===

(async () => {
  if (boutiqueId && FIREBASE_CONFIGURED) {
    await loadBoutiqueRounds();
    refreshTotalQuestions();
  }
  render();
})();
